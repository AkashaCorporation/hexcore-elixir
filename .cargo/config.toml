# Strip absolute source paths from release binaries so usernames / absolute
# cargo registry paths don't leak via panic messages or embedded debug info
# when the .node artifact is shipped via GitHub Releases.
[target.'cfg(all())']
rustflags = [
    "--remap-path-prefix=C:/Users/=~/",
    "--remap-path-prefix=/Users/=~/",
    "--remap-path-prefix=/home/=~/",
]
